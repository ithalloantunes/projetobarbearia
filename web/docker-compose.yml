services:
  db:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: barbersaas
      MYSQL_DATABASE: barbersaas
      MYSQL_USER: barbersaas
      MYSQL_PASSWORD: barbersaas
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql

  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  db_data:
