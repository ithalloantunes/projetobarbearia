services:
  db:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: barbersaas
      MYSQL_DATABASE: barbersaas
      MYSQL_USER: barbersaas
      MYSQL_PASSWORD: barbersaas
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
