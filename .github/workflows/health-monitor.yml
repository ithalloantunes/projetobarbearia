name: health-monitor

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run health monitor script
        run: node web/scripts/health-alert.mjs
        env:
          HEALTHCHECK_URL: ${{ secrets.HEALTHCHECK_URL }}
          ALERT_WEBHOOK_URL: ${{ secrets.ALERT_WEBHOOK_URL }}
          HEALTH_ERROR_RATE_THRESHOLD: ${{ vars.HEALTH_ERROR_RATE_THRESHOLD }}
