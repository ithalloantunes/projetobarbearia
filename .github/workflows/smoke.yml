name: smoke

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
      - master

jobs:
  smoke-http:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: mysql://barbersaas:barbersaas@127.0.0.1:3307/barbersaas
      SESSION_SECRET: smoke-session-secret-0123456789abcdef
      APP_BASE_URL: http://127.0.0.1:3011
    defaults:
      run:
        working-directory: web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Run smoke HTTP
        run: npm run smoke:http

  smoke-e2e:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: mysql://barbersaas:barbersaas@127.0.0.1:3307/barbersaas
      SESSION_SECRET: smoke-session-secret-0123456789abcdef
      APP_BASE_URL: http://127.0.0.1:3012
    defaults:
      run:
        working-directory: web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Build app
        run: npm run build

      - name: Run smoke E2E
        run: npm run smoke:e2e

      - name: Run smoke accessibility
        run: npm run smoke:a11y
